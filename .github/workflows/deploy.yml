name: Deploy Kallpa Calzado y Accesorios

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/kallpa-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/kallpa-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create frontend environment file
        run: |
          echo "NEXT_PUBLIC_API_URL=http://api.staging.e-commerce---kallpa-calzado-y-accesorios.${{ secrets.VPS_HOST }}.nip.io" > ./frontend/.env.production

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/kallpa-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/kallpa-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://api.staging.e-commerce---kallpa-calzado-y-accesorios.${{ secrets.VPS_HOST }}.nip.io
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase repository owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Prepare docker-compose.yml for production
        run: |
          # Limpiar las líneas de build específicas del backend y frontend para usar las imágenes pre-construidas
          # Usamos un script de python simple para reescribir el docker-compose de forma limpia y robusta
          python3 -c "
          with open('docker-compose.yml', 'r') as f:
              lines = f.readlines()
          
          out = []
          skip = False
          for i, line in enumerate(lines):
              if 'build:' in line:
                  if 'context: ./backend' in lines[i+1] or 'context: ./backend' in lines[i+2]:
                      out.append('    image: ghcr.io/${{ env.OWNER_LC }}/kallpa-backend:latest\n')
                      skip = True
                      continue
                  elif 'context: ./frontend' in lines[i+1] or 'context: ./frontend' in lines[i+2]:
                      out.append('    image: ghcr.io/${{ env.OWNER_LC }}/kallpa-frontend:latest\n')
                      skip = True
                      continue
              if skip:
                  if 'context:' in line or 'dockerfile:' in line:
                      continue
                  else:
                      skip = False
              out.append(line)
          
          with open('docker-compose.yml', 'w') as f:
              f.writelines(out)
          "
          # Save compose content to environment
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "COMPOSE_CONTENT<<$EOF" >> $GITHUB_ENV
          cat docker-compose.yml >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMPOSE_CONTENT: ${{ env.COMPOSE_CONTENT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: COMPOSE_CONTENT
          script: |
            mkdir -p ~/app/e-commerce---kallpa-calzado-y-accesorios
            cd ~/app/e-commerce---kallpa-calzado-y-accesorios
            
            echo "$COMPOSE_CONTENT" > docker-compose.yml
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Creamos la red externa si no existe
            docker network create proxy-network || true
            
            # Guardamos las variables de entorno necesarias
            echo "VPS_HOST=${{ secrets.VPS_HOST }}" > .env
            
            # Levantamos la pila
            docker-compose pull
            docker-compose up -d
            
            # Limpieza automática de imágenes antiguas (dangling) para evitar disco lleno
            docker image prune -f
